# Example configuration for the TRMNL webhook dashboard.
#
# Notes:
# - The TRMNL webhook URL is the one shown in your plugin instance configuration.
#   It contains your Plugin Settings UUID.
# - Nominatim and Open-Meteo do not require an API key for typical personal usage.
# - For Google Calendar you can use either OAuth (interactive) or a Service Account.

general:
  language: en   # fr | en
  log:
    mode: console  # console | file | both | none
    level: INFO
    file: trmnl_dashboard.log
  network:
    request_timeout_seconds: 20
    max_retries: 3
    retry_delay_seconds: 2.0
    retry_backoff: 2.0
    retry_statuses: [429, 500, 502, 503, 504]

trmnl:
  webhook_url: "https://trmnl.com/api/custom_plugins/PUT-YOUR-PLUGIN-SETTINGS-UUID-HERE"
  timeout_seconds: 15
  payload_soft_limit_bytes: 2048

weather:
  address: "San Francisco, CA, USA"
  unit_system: imperial       # metric = celsius + km/h | imperial = fahrenheit + mph
  # The UI still shows a city label resolved from Nominatim.
  # Legacy fallback remains supported if needed:
  # city: "San Francisco"
  # latitude: 37.7749
  # longitude: -122.4194
  # Legacy advanced overrides remain supported if needed:
  # temperature_unit: celsius   # celsius | fahrenheit
  # wind_speed_unit: kmh        # kmh | mph | ms | kn

finance:
  entries:
    - symbol: "^FCHI"
      label: "CAC 40 🇫🇷"
      show_currency: false
    - symbol: "^GSPC"
      label: "S&P 500 🇺🇸"
      show_currency: false
    - symbol: "^DJI"
      label: "Dow Jones 🇺🇸"
      show_currency: false
    - symbol: "^N225"
      label: "Nikkei 225 🇯🇵"
      show_currency: false
    - symbol: "NVDA"
      label: "Nvidia"
      currency: "USD"
      show_currency: true
    - symbol: "AAPL"
      label: "Apple"
      currency: "USD"
      show_currency: true
    - symbol: "MSFT"
      label: "Microsoft"
      currency: "USD"
      show_currency: true
    - symbol: "GC=F"
      label: "GOLD"
      currency: "USD"
      show_currency: true
    - symbol: "BZ=F"
      label: "Brent Oil"
      currency: "USD"
      show_currency: true

google_calendar:
  mode: oauth  # oauth | service_account
  timezone: "America/Los_Angeles"
  calendar_ids:
    - primary
    # - family00755357809671195572@group.calendar.google.com
  # Legacy single-calendar form remains supported:
  # calendar_id: primary
  oauth:
    credentials_json: "credentials.json"
    token_json: "token.json"
  service_account:
    json: "service_account.json"

calendar:
  max_events_per_day: 3
  max_title_length: 32
